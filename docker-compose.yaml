services:
  jouri_nexus:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jouri_nexus
    restart: unless-stopped
    ports:
      - "8501:8501"  # 已修正：与 Dockerfile 里的 8501 对齐
    env_file:
      - .env
    volumes:
      - nexus_data:/app/data  # 已修正：改用命名卷，彻底解决权限报错
      - nexus_logs:/app/logs  # 已修正：改用命名卷，彻底解决权限报错
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          memory: 2G  
        reservations:
          memory: 256M

# 声明命名卷
volumes:
  nexus_data:
  nexus_logs:
